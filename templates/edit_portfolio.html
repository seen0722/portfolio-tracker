<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Portfolio - Portfolio Analyst</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1>Edit Portfolio</h1>
                <nav>
                    <a href="/" class="nav-link">Dashboard</a>
                    <a href="/edit" class="nav-link active">Edit Portfolio</a>
                </nav>
            </div>
        </header>

        <main>
            <form action="/edit" method="POST">
                <section class="section">
                    <h3>Stocks</h3>
                    <div id="stocks-container" class="form-container">
                        {% for stock in portfolio.stocks %}
                        <div class="row stock-row">
                            <div class="form-group">
                                <label>Symbol</label>
                                <input type="text" name="stock_symbol[]" value="{{ stock.symbol }}" required placeholder="e.g. AAPL">
                            </div>
                            <div class="form-group">
                                <label>Shares</label>
                                <input type="number" step="any" name="stock_shares[]" value="{{ stock.shares }}" required placeholder="0.0">
                            </div>
                            <div class="form-group">
                                <label>Avg Cost</label>
                                <input type="number" step="any" name="stock_cost[]" value="{{ stock.average_cost }}" required placeholder="0.0">
                            </div>
                            <button type="button" onclick="removeRow(this)" class="btn-icon remove-btn">✕</button>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" onclick="addStockRow()" class="btn btn-outline mt-2">+ Add Stock</button>
                </section>

                <section class="section">
                    <h3>Cash</h3>
                    <div id="cash-container" class="form-container">
                        {% for cash in portfolio.cash %}
                        <div class="row cash-row">
                            <div class="form-group">
                                <label>Currency</label>
                                <input type="text" name="cash_currency[]" value="{{ cash.currency }}" required placeholder="e.g. USD">
                            </div>
                            <div class="form-group">
                                <label>Amount</label>
                                <input type="number" step="any" name="cash_amount[]" value="{{ cash.amount }}" required placeholder="0.0">
                            </div>
                            <button type="button" onclick="removeRow(this)" class="btn-icon remove-btn">✕</button>
                        </div>
                        {% endfor %}
                    </div>
                    <button type="button" onclick="addCashRow()" class="btn btn-outline mt-2">+ Add Cash</button>
                </section>

                <div class="actions mt-4 flex-end">
                    <a href="/" class="btn btn-outline">Cancel</a>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        function removeRow(btn) {
            btn.closest('.row').remove();
        }

        function addStockRow() {
            const container = document.getElementById('stocks-container');
            const div = document.createElement('div');
            div.className = 'row stock-row';
            div.innerHTML = `
                <div class="form-group">
                    <label>Symbol</label>
                    <input type="text" name="stock_symbol[]" required placeholder="e.g. AAPL">
                </div>
                <div class="form-group">
                    <label>Shares</label>
                    <input type="number" step="any" name="stock_shares[]" required placeholder="0.0">
                </div>
                <div class="form-group">
                    <label>Avg Cost</label>
                    <input type="number" step="any" name="stock_cost[]" required placeholder="0.0">
                </div>
                <button type="button" onclick="removeRow(this)" class="btn-icon remove-btn">✕</button>
            `;
            container.appendChild(div);
        }

        function addCashRow() {
            const container = document.getElementById('cash-container');
            const div = document.createElement('div');
            div.className = 'row cash-row';
            div.innerHTML = `
                <div class="form-group">
                    <label>Currency</label>
                    <input type="text" name="cash_currency[]" required placeholder="e.g. USD">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" step="any" name="cash_amount[]" required placeholder="0.0">
                </div>
                <button type="button" onclick="removeRow(this)" class="btn-icon remove-btn">✕</button>
            `;
            container.appendChild(div);
        }
    </script>
</body>
</html>
