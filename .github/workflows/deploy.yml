name: Deploy

# Auto-deploy to the Vultr VPS on every push to main (or run manually).
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Least privilege: this job deploys over SSH and never writes back to the repo,
# so a compromised step cannot rewrite repo contents or mint a broad token.
permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only ever deploy main — a workflow_dispatch against any other ref no-ops.
    if: github.ref == 'refs/heads/main'
    steps:
      # Native ssh: the root key stays in a runner-local file and never crosses a
      # third-party action boundary. Secrets go through env (no shell injection).
      - name: Deploy over SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host keys (captured out-of-band from the server) — StrictHostKeyChecking
          # then fails closed on any mismatch, so a MitM cannot impersonate the host.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT:-22}" \
            -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts -o CheckHostIP=yes \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            'set -euo pipefail; cd /var/www/portfolio-tracker && git fetch --all --prune && git reset --hard origin/main && bash deploy/redeploy.sh'
